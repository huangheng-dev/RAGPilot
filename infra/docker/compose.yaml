name: ragpilot

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragpilot}
      POSTGRES_USER: ${POSTGRES_USER:-ragpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpilot}
    ports:
      - "${RAGPILOT_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ragpilot} -d ${POSTGRES_DB:-ragpilot}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${RAGPILOT_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ragpilot}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ragpilot123}
    command: server /data --console-address ":9001"
    ports:
      - "${RAGPILOT_MINIO_API_PORT:-9000}:9000"
      - "${RAGPILOT_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "${RAGPILOT_ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  temporal:
    image: temporalio/auto-setup:1.25.2
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-ragpilot}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-ragpilot}
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${RAGPILOT_TEMPORAL_PORT:-7233}:7233"
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "temporal:7233"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  temporal-ui:
    image: temporalio/ui:2.31.2
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:${RAGPILOT_WEB_PORT:-3000}
    depends_on:
      temporal:
        condition: service_healthy
    ports:
      - "${RAGPILOT_TEMPORAL_UI_PORT:-8080}:8080"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ../otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "${RAGPILOT_OTEL_GRPC_PORT:-4317}:4317"
      - "${RAGPILOT_OTEL_HTTP_PORT:-4318}:4318"
      - "${RAGPILOT_OTEL_METRICS_PORT:-9464}:9464"
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.6.1
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ../observability/tempo.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "${RAGPILOT_TEMPO_PORT:-3200}:3200"

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.retention.time=${RAGPILOT_METRIC_RETENTION:-15d}
    volumes:
      - ../observability/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - ../observability/alerts.yaml:/etc/prometheus/alerts.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - "${RAGPILOT_PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:11.2.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-ragpilot-observability}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${RAGPILOT_GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
      - tempo

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      args:
        API_OPTIONAL_EXTRAS: ${RAGPILOT_API_OPTIONAL_EXTRAS:-retrieval-llamaindex,agent-langgraph}
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${NODE_ENV:-development}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ragpilot}
      POSTGRES_USER: ${POSTGRES_USER:-ragpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpilot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-ragpilot-ingestion}
      AGENT_TEMPORAL_TASK_QUEUE: ${AGENT_TEMPORAL_TASK_QUEUE:-ragpilot-agent-execution}
      AGENT_APPROVAL_TIMEOUT_HOURS: ${AGENT_APPROVAL_TIMEOUT_HOURS:-24}
      AGENT_EXECUTION_MAX_TOOL_CALLS: ${AGENT_EXECUTION_MAX_TOOL_CALLS:-8}
      AGENT_EXECUTION_MAX_RUNTIME_SECONDS: ${AGENT_EXECUTION_MAX_RUNTIME_SECONDS:-900}
      AGENT_EXECUTION_MAX_OUTPUT_BYTES: ${AGENT_EXECUTION_MAX_OUTPUT_BYTES:-256000}
      AGENT_RUNTIME_ENGINE: ${AGENT_RUNTIME_ENGINE:-langgraph_pilot}
      RETRIEVAL_ENGINE: ${RETRIEVAL_ENGINE:-native}
      RETRIEVAL_SCORE_NORMALIZATION_STRATEGY: ${RETRIEVAL_SCORE_NORMALIZATION_STRATEGY:-rank_percentile_v1}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_TRACE_SAMPLE_RATIO: ${OTEL_TRACE_SAMPLE_RATIO:-1.0}
      ELASTICSEARCH_RETRIEVAL_ENABLED: ${ELASTICSEARCH_RETRIEVAL_ENABLED:-true}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      ELASTICSEARCH_INDEX_PREFIX: ${ELASTICSEARCH_INDEX_PREFIX:-ragpilot-document-chunks}
      ELASTICSEARCH_REQUEST_TIMEOUT_SECONDS: ${ELASTICSEARCH_REQUEST_TIMEOUT_SECONDS:-5}
      CHAT_MODEL_PROVIDER: ${CHAT_MODEL_PROVIDER:-deterministic}
      CHAT_MODEL_NAME: ${CHAT_MODEL_NAME:-ragpilot-grounded-template}
      CHAT_MODEL_API_BASE_URL: ${CHAT_MODEL_API_BASE_URL:-}
      CHAT_MODEL_API_KEY: ${CHAT_MODEL_API_KEY:-}
      RUNTIME_CREDENTIAL_MASTER_KEY: ${RUNTIME_CREDENTIAL_MASTER_KEY:-ragpilot-local-development-master-key-change-me}
      MODEL_RUNTIME_CONCURRENCY_LIMIT: ${MODEL_RUNTIME_CONCURRENCY_LIMIT:-8}
      MODEL_RUNTIME_REQUESTS_PER_MINUTE: ${MODEL_RUNTIME_REQUESTS_PER_MINUTE:-120}
      MODEL_RUNTIME_MAX_ATTEMPTS: ${MODEL_RUNTIME_MAX_ATTEMPTS:-2}
      MODEL_RUNTIME_RETRY_BACKOFF_SECONDS: ${MODEL_RUNTIME_RETRY_BACKOFF_SECONDS:-0.25}
      MODEL_RUNTIME_RETRYABLE_STATUS_CODES: ${MODEL_RUNTIME_RETRYABLE_STATUS_CODES:-429,502,503,504}
      MODEL_INPUT_COST_PER_1K_TOKENS_USD: ${MODEL_INPUT_COST_PER_1K_TOKENS_USD:-0}
      MODEL_OUTPUT_COST_PER_1K_TOKENS_USD: ${MODEL_OUTPUT_COST_PER_1K_TOKENS_USD:-0}
      MCP_RUNTIME_CONCURRENCY_LIMIT: ${MCP_RUNTIME_CONCURRENCY_LIMIT:-16}
      MCP_RUNTIME_REQUESTS_PER_MINUTE: ${MCP_RUNTIME_REQUESTS_PER_MINUTE:-240}
      MCP_RUNTIME_MAX_ATTEMPTS: ${MCP_RUNTIME_MAX_ATTEMPTS:-2}
      MCP_RUNTIME_RETRY_BACKOFF_SECONDS: ${MCP_RUNTIME_RETRY_BACKOFF_SECONDS:-0.25}
      CHAT_MODEL_REQUEST_TIMEOUT_SECONDS: ${CHAT_MODEL_REQUEST_TIMEOUT_SECONDS:-180}
      AUTH_PRIMARY_MODE: ${AUTH_PRIMARY_MODE:-directory_local}
      AUTH_PROVIDER_DISPLAY_NAME: ${AUTH_PROVIDER_DISPLAY_NAME:-Enterprise Identity}
      AUTH_PROVIDER_SIGN_IN_URL: ${AUTH_PROVIDER_SIGN_IN_URL:-}
      ALLOW_LEGACY_ACTOR_HEADERS: ${ALLOW_LEGACY_ACTOR_HEADERS:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      otel-collector:
        condition: service_started
    ports:
      - "${RAGPILOT_API_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/live', timeout=3)
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-ragpilot-ingestion}
      AGENT_TEMPORAL_TASK_QUEUE: ${AGENT_TEMPORAL_TASK_QUEUE:-ragpilot-agent-execution}
      AGENT_APPROVAL_TIMEOUT_HOURS: ${AGENT_APPROVAL_TIMEOUT_HOURS:-24}
      AGENT_RUNTIME_ENGINE: ${AGENT_RUNTIME_ENGINE:-langgraph_pilot}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ragpilot}
      POSTGRES_USER: ${POSTGRES_USER:-ragpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpilot}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ragpilot}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ragpilot123}
      MINIO_BUCKET: ${MINIO_BUCKET:-ragpilot-documents}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-deterministic}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-ragpilot-dev-1536}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
      EMBEDDING_API_BASE_URL: ${EMBEDDING_API_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      ELASTICSEARCH_PROJECTION_ENABLED: ${ELASTICSEARCH_PROJECTION_ENABLED:-true}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      ELASTICSEARCH_REQUEST_TIMEOUT_SECONDS: ${ELASTICSEARCH_REQUEST_TIMEOUT_SECONDS:-30}
      ELASTICSEARCH_INDEX_PREFIX: ${ELASTICSEARCH_INDEX_PREFIX:-ragpilot-document-chunks}
      ELASTICSEARCH_INDEX_VERSION: ${ELASTICSEARCH_INDEX_VERSION:-1}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
    depends_on:
      temporal:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      elasticsearch:
        condition: service_started
      otel-collector:
        condition: service_started

  agent-worker:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      args:
        API_OPTIONAL_EXTRAS: ${RAGPILOT_API_OPTIONAL_EXTRAS:-retrieval-llamaindex,agent-langgraph}
    restart: unless-stopped
    command: ["python", "-m", "ragpilot_api.workers.agent_execution_worker"]
    environment:
      ENVIRONMENT: ${NODE_ENV:-development}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ragpilot}
      POSTGRES_USER: ${POSTGRES_USER:-ragpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpilot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-ragpilot-ingestion}
      AGENT_TEMPORAL_TASK_QUEUE: ${AGENT_TEMPORAL_TASK_QUEUE:-ragpilot-agent-execution}
      AGENT_APPROVAL_TIMEOUT_HOURS: ${AGENT_APPROVAL_TIMEOUT_HOURS:-24}
      AGENT_EXECUTION_MAX_TOOL_CALLS: ${AGENT_EXECUTION_MAX_TOOL_CALLS:-8}
      AGENT_EXECUTION_MAX_RUNTIME_SECONDS: ${AGENT_EXECUTION_MAX_RUNTIME_SECONDS:-900}
      AGENT_EXECUTION_MAX_OUTPUT_BYTES: ${AGENT_EXECUTION_MAX_OUTPUT_BYTES:-256000}
      AGENT_RUNTIME_ENGINE: ${AGENT_RUNTIME_ENGINE:-langgraph_pilot}
      RETRIEVAL_ENGINE: ${RETRIEVAL_ENGINE:-native}
      CHAT_MODEL_PROVIDER: ${CHAT_MODEL_PROVIDER:-deterministic}
      CHAT_MODEL_NAME: ${CHAT_MODEL_NAME:-ragpilot-grounded-template}
      CHAT_MODEL_API_BASE_URL: ${CHAT_MODEL_API_BASE_URL:-}
      CHAT_MODEL_API_KEY: ${CHAT_MODEL_API_KEY:-}
      RUNTIME_CREDENTIAL_MASTER_KEY: ${RUNTIME_CREDENTIAL_MASTER_KEY:-ragpilot-local-development-master-key-change-me}
      MODEL_RUNTIME_CONCURRENCY_LIMIT: ${MODEL_RUNTIME_CONCURRENCY_LIMIT:-8}
      MODEL_RUNTIME_REQUESTS_PER_MINUTE: ${MODEL_RUNTIME_REQUESTS_PER_MINUTE:-120}
      MODEL_RUNTIME_MAX_ATTEMPTS: ${MODEL_RUNTIME_MAX_ATTEMPTS:-2}
      MODEL_RUNTIME_RETRY_BACKOFF_SECONDS: ${MODEL_RUNTIME_RETRY_BACKOFF_SECONDS:-0.25}
      MODEL_RUNTIME_RETRYABLE_STATUS_CODES: ${MODEL_RUNTIME_RETRYABLE_STATUS_CODES:-429,502,503,504}
      MODEL_INPUT_COST_PER_1K_TOKENS_USD: ${MODEL_INPUT_COST_PER_1K_TOKENS_USD:-0}
      MODEL_OUTPUT_COST_PER_1K_TOKENS_USD: ${MODEL_OUTPUT_COST_PER_1K_TOKENS_USD:-0}
      MCP_RUNTIME_CONCURRENCY_LIMIT: ${MCP_RUNTIME_CONCURRENCY_LIMIT:-16}
      MCP_RUNTIME_REQUESTS_PER_MINUTE: ${MCP_RUNTIME_REQUESTS_PER_MINUTE:-240}
      MCP_RUNTIME_MAX_ATTEMPTS: ${MCP_RUNTIME_MAX_ATTEMPTS:-2}
      MCP_RUNTIME_RETRY_BACKOFF_SECONDS: ${MCP_RUNTIME_RETRY_BACKOFF_SECONDS:-0.25}
    depends_on:
      temporal:
        condition: service_healthy
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${RAGPILOT_API_PORT:-8000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${RAGPILOT_WEB_PORT:-3000}:3000"

volumes:
  postgres-data:
  minio-data:
  elasticsearch-data:
  tempo-data:
  prometheus-data:
  grafana-data:
