apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragpilot-api
  namespace: ragpilot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ragpilot-api
  template:
    metadata:
      labels:
        app: ragpilot-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/ragpilot-api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: ragpilot-config
            - secretRef:
                name: ragpilot-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
