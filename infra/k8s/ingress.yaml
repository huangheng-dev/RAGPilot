apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ragpilot
  namespace: ragpilot
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
spec:
  tls:
    - hosts:
        - ragpilot.example.com
      secretName: ragpilot-tls
  rules:
    - host: ragpilot.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ragpilot-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ragpilot-web
                port:
                  number: 80
