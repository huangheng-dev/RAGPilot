apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ragpilot
  namespace: ragpilot
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: ragpilot.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ragpilot-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ragpilot-web
                port:
                  number: 80
