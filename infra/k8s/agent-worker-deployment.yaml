apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragpilot-agent-worker
  namespace: ragpilot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ragpilot-agent-worker
  template:
    metadata:
      labels:
        app: ragpilot-agent-worker
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent-worker
          image: ghcr.io/your-org/ragpilot-api:0.1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["python", "-m", "ragpilot_api.workers.agent_execution_worker"]
          envFrom:
            - configMapRef:
                name: ragpilot-config
            - secretRef:
                name: ragpilot-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
