name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  web:
    name: Web build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run web:build

      - name: Audit production delivery assets
        shell: pwsh
        run: npm run release:delivery-audit

  api:
    name: API tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./apps/api
          python -m pip install pytest

      - name: Run API tests
        run: pytest apps/api/tests
