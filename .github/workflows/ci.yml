name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  containers:
    name: Container build (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: infra/docker/api.Dockerfile
            build_args: API_OPTIONAL_EXTRAS=retrieval-llamaindex,agent-langgraph
          - image: worker
            dockerfile: infra/docker/worker.Dockerfile
            build_args: ""
          - image: web
            dockerfile: infra/docker/web.Dockerfile
            build_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build release-profile image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          push: false
          cache-from: type=gha,scope=ci-${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.image }}

  web:
    name: Web build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production Node dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build web
        run: npm run web:build

      - name: Build and test MCP server
        run: npm run mcp:build && npm run mcp:test

      - name: Audit production delivery assets
        shell: pwsh
        run: ./infra/scripts/production-delivery-audit.ps1

  api:
    name: API tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install API dependencies
        run: |
          python -m pip install uv==0.11.16
          uv sync --project apps/api --locked --all-extras --dev

      - name: Audit API Python dependencies
        run: uv run --project apps/api --locked pip-audit

      - name: Audit synchronized dependency locks
        shell: pwsh
        run: ./infra/scripts/dependency-lock-audit.ps1

      - name: Start Temporal test dependency
        run: |
          docker compose -f infra/docker/compose.yaml up -d postgres temporal
          for attempt in {1..60}; do
            if (echo > /dev/tcp/127.0.0.1/7233) 2>/dev/null && docker compose -f infra/docker/compose.yaml exec -T postgres pg_isready -U ragpilot -d ragpilot; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f infra/docker/compose.yaml logs temporal
          exit 1

      - name: Run API tests
        env:
          TEMPORAL_TEST_ADDRESS: localhost:7233
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
        run: |
          uv run --project apps/api --locked alembic upgrade head
          uv run --project apps/api --locked python -m ragpilot_api.commands.retrieval_contract_gate packages/evals/retrieval/core-contract-v1.json
          uv run --project apps/api --locked python -m ragpilot_api.commands.retrieval_database_gate packages/evals/retrieval/database-contract-v1.json
          uv run --project apps/api --locked python -m ragpilot_api.commands.retrieval_framework_gate packages/evals/retrieval/database-contract-v1.json
          uv run --project apps/api --locked python -m ragpilot_api.commands.agent_runtime_framework_gate packages/evals/agents/runtime-contract-v1.json
          uv run --project apps/api --locked pytest apps/api/tests

      - name: Stop Temporal test dependency
        if: always()
        run: docker compose -f infra/docker/compose.yaml down --volumes

  worker:
    name: Worker tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Worker dependencies
        run: |
          python -m pip install uv==0.11.16
          uv sync --project apps/worker --locked --dev

      - name: Audit Worker Python dependencies
        run: uv run --project apps/worker --locked pip-audit

      - name: Run Worker tests
        run: uv run --project apps/worker --locked pytest apps/worker/tests
