name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  web:
    name: Web build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run web:build

      - name: Audit production delivery assets
        shell: pwsh
        run: ./infra/scripts/production-delivery-audit.ps1

  api:
    name: API tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e './apps/api[retrieval-llamaindex,agent-langgraph]'
          python -m pip install pytest

      - name: Run API tests
        run: python -m pytest apps/api/tests
