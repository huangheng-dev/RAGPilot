name: Release Readiness

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: release-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-readiness:
    name: Release readiness checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install web dependencies
        run: npm ci

      - name: Audit public documentation
        shell: pwsh
        run: ./infra/scripts/public-docs-audit.ps1

      - name: Audit public markdown links
        shell: pwsh
        run: ./infra/scripts/public-links-audit.ps1

      - name: Build web
        run: npm run web:build

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e './apps/api[retrieval-llamaindex,agent-langgraph]'
          python -m pip install pytest

      - name: Start Temporal test dependency
        run: |
          docker compose -f infra/docker/compose.yaml up -d postgres temporal
          for attempt in {1..60}; do
            if (echo > /dev/tcp/127.0.0.1/7234) 2>/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f infra/docker/compose.yaml logs temporal
          exit 1

      - name: Run API tests
        env:
          TEMPORAL_TEST_ADDRESS: localhost:7234
        run: python -m pytest apps/api/tests

      - name: Stop Temporal test dependency
        if: always()
        run: docker compose -f infra/docker/compose.yaml down --volumes

      - name: Audit public release candidate files
        shell: pwsh
        run: ./infra/scripts/release-candidate-audit.ps1

      - name: Audit production delivery assets
        shell: pwsh
        run: ./infra/scripts/production-delivery-audit.ps1

      - name: Run secret scan
        shell: pwsh
        run: ./infra/scripts/secret-scan.ps1
