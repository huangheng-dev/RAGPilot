name: Release Readiness

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: release-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-readiness:
    name: Release readiness checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Python dependency manager
        run: python -m pip install uv==0.11.16

      - name: Install web dependencies
        run: npm ci

      - name: Run the release preflight gate
        run: npm run release:preflight

      - name: Clean up test dependencies
        if: always()
        run: docker compose -f infra/docker/compose.yaml down --volumes
